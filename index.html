<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toan VS Cho Hoa </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border-radius: 8px;
            overflow: hidden;
            width: 95vw;
            max-width: 1200px; 
            height: calc(95vw * 600 / 900);
            max-height: 90vh;
        }

        @media (min-aspect-ratio: 9/6) {
            .game-container {
                height: 90vh;
                width: calc(90vh * 900 / 600);
            }
        }

        canvas {
            background: #5c8a32;
            display: block;
            width: 100%;
            height: 100%;
        }

        .rotate-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            color: white;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .rotate-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: rotateAnim 2s infinite linear;
        }
        @keyframes rotateAnim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        @media screen and (max-width: 900px) and (orientation: portrait) {
            .rotate-warning { display: flex; }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: url('images/menu-bg.jpg') no-repeat center center;
            background-size: cover;
        }

        #mainMenu h1 {
            color: #5c8a32;
            font-size: 50px;
            margin: 0 0 10px 0;
            text-shadow: 3px 3px #000;
        }
        .credit-text {
            color: #ffb703;
            font-size: 22px;
            margin-bottom: 50px;
            font-style: italic;
            font-weight: bold;
        }
        
        .menu-btn {
            background: #8c6339;
            color: white;
            border: 3px solid #4a3319;
            padding: 12px 50px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 5px 0 #4a3319;
            margin: 8px 0;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #4a3319;
        }
        .btn-secondary {
            background: #555 !important;
            border-color: #333 !important;
            box-shadow: 0 5px 0 #333 !important;
        }

        .ingame-controls {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 5;
            display: flex;
            gap: 10px;
        }
        .ctrl-btn {
            background: #4a3319;
            color: #fff;
            border: 2px solid #332211;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        .ctrl-btn:hover { background: #5c8a32; }
    </style>
</head>
<body>

<div class="rotate-warning">
    <div class="rotate-icon">🔄</div>
    <h2>Vui lòng xoay ngang điện thoại</h2>
    <p style="color: #888; margin-top: 10px;">Hãy bật tính năng "Tự động xoay" và quay ngang máy để trải nghiệm game tốt nhất cùng Toàn đẹp trai nhé!</p>
</div>

<div class="game-container">
    <div class="ingame-controls" id="inGameBar" style="display: none;">
        <button class="ctrl-btn" id="btnSpeed" onclick="toggleSpeed()">Tốc độ: 1x</button>
        <button class="ctrl-btn" id="btnPause" onclick="togglePause()">Tạm Dừng</button>
    </div>

    <div id="mainMenu" class="overlay">
        <h1>PLANTS VS ZOMBIES</h1>
        <div class="credit-text">toàn đẹp trai đã làm game này</div>
        <button class="menu-btn" onclick="startGame()">CHƠI</button>
    </div>

    <div id="pauseOverlay" class="overlay" style="display: none; background: rgba(0,0,0,0.8); z-index: 12;">
        <h2 style="font-size: 40px; color: #ffd700; margin-bottom: 20px;">ĐANG TẠM DỪNG</h2>
        <button class="menu-btn" onclick="togglePause()">TIẾP TỤC</button>
        <button class="menu-btn btn-secondary" style="font-size:16px; padding:8px 25px;" onclick="backToMenu()">VỀ MENU CHÍNH</button>
    </div>

    <div id="gameOverOverlay" class="overlay" style="display: none; background: rgba(40, 0, 0, 0.95); z-index: 12;">
        <h2 style="font-size: 42px; color: #ff3333; margin-bottom: 10px; text-shadow: 2px 2px #000;">ZOMBIE ĐÃ ĂN NÃO CỦA BẠN!</h2>
        <p style="color: #bbb; font-size: 18px; margin-bottom: 30px;">Đừng lo, Toàn đẹp trai luôn cho bạn cơ hội làm lại!</p>
        <div style="display: flex; gap: 15px;">
            <button class="menu-btn" style="font-size: 18px; padding: 10px 35px;" onclick="startGame()">CHƠI LẠI</button>
            <button class="menu-btn btn-secondary" style="font-size: 18px; padding: 10px 35px;" onclick="backToMenu()">MENU CHÍNH</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'MENU'; 
let gameSpeed = 1; 
let globalFrame = 0; 

// --- TỰ ĐỘNG KHỞI TẠO ẢNH BÍ MẬT ---
const imgStatus = { sunflower: false, peashooter: false, wallnut: false, sun: false, pea: false };
const imgSunflower = new Image(); imgSunflower.src = 'images/sunflower.png'; imgSunflower.onload = () => imgStatus.sunflower = true;
const imgPeashooter = new Image(); imgPeashooter.src = 'images/peashooter.png'; imgPeashooter.onload = () => imgStatus.peashooter = true;

// 🛠️ THÊM ẢNH CHO BÁNH MÌ (Có thể đổi đuôi thành .gif nếu thích)
const imgWallnut = new Image(); imgWallnut.src = 'images/wallnut.png'; imgWallnut.onload = () => imgStatus.wallnut = true;

const imgSun = new Image(); imgSun.src = 'images/sun.png'; imgSun.onload = () => imgStatus.sun = true;
const imgPea = new Image(); imgPea.src = 'images/pea.png'; imgPea.onload = () => imgStatus.pea = true;

// --- CONFIG RANDOM ZOMBIE ---
const totalZombieImages = 3; 
const zombieImagesArray = [];
const zombieImagesLoaded = [];

for (let i = 1; i <= totalZombieImages; i++) {
    let img = new Image();
    img.src = `images/zombie${i}.png`;
    zombieImagesLoaded.push(false);
    img.onload = () => { zombieImagesLoaded[i - 1] = true; };
    zombieImagesArray.push(img);
}

let sun = 500; 
let score = 0;
const gridWidth = 100, gridHeight = 100, rows = 5, cols = 9, uiHeight = 100;
let plants = [], zombies = [], projectiles = [], suns = [];
let frameCount = 0;
let selectedPlant = null;

class Plant {
    constructor(x, y, type) {
        this.gridX = x; this.gridY = y;
        this.x = x * gridWidth + gridWidth / 2;
        this.y = y * gridHeight + uiHeight + gridHeight / 2;
        this.type = type;
        
        // 🛠️ THIẾT LẬP MÁU: Bánh mì có 300 máu (trụ được khoảng 10 giây khi bị cắn)
        if (type === 'sunflower') this.health = 100;
        else if (type === 'peashooter') this.health = 150;
        else if (type === 'wallnut') this.health = 300; 
        
        this.maxHealth = this.health;
        this.timer = 0;
    }
    update() {
        this.timer++;
        if (this.type === 'sunflower' && this.timer % 600 === 0) {
            suns.push(new Sun(this.x + Math.random()*20 - 10, this.y + 10, false));
        } else if (this.type === 'peashooter' && this.timer % 90 === 0 && isZombieInRow(this.gridY)) {
            projectiles.push(new Projectile(this.x + 20, this.y - 10));
        }
        // Bánh mì (wallnut) không cần bắn hay tạo mặt trời, nó chỉ đứng im chịu đòn thôi!
    }
    draw() {
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (this.type === 'sunflower') {
            if (imgStatus.sunflower) ctx.drawImage(imgSunflower, this.x - 40, this.y - 40, 80, 80);
            else { ctx.font = "50px Arial"; ctx.fillText("🌻", this.x, this.y); }
        } else if (this.type === 'peashooter') {
            if (imgStatus.peashooter) ctx.drawImage(imgPeashooter, this.x - 40, this.y - 40, 80, 80);
            else { ctx.font = "50px Arial"; ctx.fillText("🌱", this.x, this.y); }
        } else if (this.type === 'wallnut') {
            // 🛠️ VẼ HÌNH BÁNH MÌ
            if (imgStatus.wallnut) ctx.drawImage(imgWallnut, this.x - 40, this.y - 40, 80, 80);
            else { ctx.font = "50px Arial"; ctx.fillText("🍞", this.x, this.y); }
        }
        
        ctx.fillStyle = 'red'; ctx.fillRect(this.x - 30, this.y - 45, 60, 4);
        ctx.fillStyle = 'green'; ctx.fillRect(this.x - 30, this.y - 45, (this.health / this.maxHealth) * 60, 4);
    }
}

class Zombie {
    constructor(row) {
        this.row = row;
        this.x = canvas.width;
        this.y = row * gridHeight + uiHeight + gridHeight / 2;
        this.speed = 0.2 + Math.random() * 0.15; 
        this.health = 100;
        this.alive = true;
        this.imageIndex = Math.floor(Math.random() * totalZombieImages);
    }
    update() {
        let targetPlant = plants.find(p => p.gridY === this.row && Math.abs(p.x - this.x) < 40 && p.health > 0);
        if (targetPlant) {
            targetPlant.health -= 0.5; // Tốc độ gặm của Zombie
        } else {
            this.x -= this.speed;
        }
        if (this.x < 0) {
            gameState = 'GAMEOVER';
            document.getElementById('gameOverOverlay').style.display = 'flex';
            document.getElementById('inGameBar').style.display = 'none';
        }
    }
    draw() {
        if (zombieImagesLoaded[this.imageIndex]) {
            ctx.drawImage(zombieImagesArray[this.imageIndex], this.x - 40, this.y - 50, 80, 100);
        } else {
            ctx.font = "50px Arial"; ctx.fillText("🧟", this.x, this.y);
        }
        ctx.fillStyle = 'red'; ctx.fillRect(this.x - 25, this.y - 55, 50, 4);
        ctx.fillStyle = 'green'; ctx.fillRect(this.x - 25, this.y - 55, (this.health / 100) * 50, 4);
    }
}

class Projectile {
    constructor(x, y) { this.x = x; this.y = y; this.speed = 4; this.damage = 20; this.alive = true; }
    update() { this.x += this.speed; if (this.x > canvas.width) this.alive = false; }
    draw() {
        if (imgStatus.pea) { ctx.drawImage(imgPea, this.x - 10, this.y - 10, 20, 20); }
        else { ctx.font = "20px Arial"; ctx.fillText("🟢", this.x, this.y); }
    }
}

class Sun {
    constructor(x, y, isFalling) {
        this.x = x; this.y = isFalling ? 0 : y;
        this.targetY = isFalling ? Math.random() * 400 + 150 : y;
        this.isFalling = isFalling; this.timer = 0; this.alive = true;
    }
    update() { if (this.isFalling && this.y < this.targetY) this.y += 2; this.timer++; if (this.timer >= 500) this.alive = false; }
    draw() {
        if (imgStatus.sun) { ctx.drawImage(imgSun, this.x - 20, this.y - 20, 40, 40); }
        else { ctx.font = "40px Arial"; ctx.fillText("☀️", this.x, this.y); }
    }
}

function resetGameData() {
    sun = 500; score = 0; plants = []; zombies = []; projectiles = []; suns = []; frameCount = 0; selectedPlant = null; gameSpeed = 1;
    document.getElementById('btnSpeed').innerText = `Tốc độ: 1x`;
}

function startGame() {
    resetGameData();
    document.getElementById('mainMenu').style.display = 'none';
    document.getElementById('gameOverOverlay').style.display = 'none';
    document.getElementById('pauseOverlay').style.display = 'none';
    document.getElementById('inGameBar').style.display = 'flex';
    gameState = 'PLAYING';
}

function backToMenu() {
    resetGameData();
    document.getElementById('mainMenu').style.display = 'flex';
    document.getElementById('gameOverOverlay').style.display = 'none';
    document.getElementById('pauseOverlay').style.display = 'none';
    document.getElementById('inGameBar').style.display = 'none';
    gameState = 'MENU';
}

function togglePause() {
    if (gameState === 'PLAYING') {
        gameState = 'PAUSED';
        document.getElementById('pauseOverlay').style.display = 'flex';
    } else if (gameState === 'PAUSED') {
        gameState = 'PLAYING';
        document.getElementById('pauseOverlay').style.display = 'none';
    }
}

function toggleSpeed() {
    if (gameSpeed === 1) gameSpeed = 2;
    else if (gameSpeed === 2) gameSpeed = 0.5; 
    else gameSpeed = 1; 
    let txt = gameSpeed === 0.5 ? "0.5x (Chậm)" : `${gameSpeed}x`;
    document.getElementById('btnSpeed').innerText = `Tốc độ: ${txt}`;
}

function isZombieInRow(row) { return zombies.some(z => z.row === row && z.x > 0 && z.alive); }

canvas.addEventListener('click', (e) => {
    if (gameState !== 'PLAYING') return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

    suns.forEach((s) => { if (s.alive && Math.hypot(s.x - mouseX, s.y - mouseY) < 35) { sun += 25; s.alive = false; } });

    if (mouseY < uiHeight) {
        // 🛠️ ĐIỀU KHIỂN CHỌN CÂY TRÊN THANH UI
        if (mouseX > 310 && mouseX < 390) selectedPlant = 'sunflower';
        if (mouseX > 410 && mouseX < 490) selectedPlant = 'peashooter';
        if (mouseX > 510 && mouseX < 590) selectedPlant = 'wallnut'; // Thẻ Bánh Mì
    } else if (selectedPlant) {
        let gx = Math.floor(mouseX / gridWidth), gy = Math.floor((mouseY - uiHeight) / gridHeight);
        if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
            if (!plants.some(p => p.gridX === gx && p.gridY === gy)) {
                let cost = 100;
                if (selectedPlant === 'sunflower') cost = 50;
                if (selectedPlant === 'peashooter') cost = 100;
                if (selectedPlant === 'wallnut') cost = 50; // Giá tiền Bánh Mì
                
                if (sun >= cost) { plants.push(new Plant(gx, gy, selectedPlant)); sun -= cost; selectedPlant = null; }
            }
        }
    }
});

function updateGameLogic() {
    frameCount++;
    if (frameCount % 400 === 0) suns.push(new Sun(Math.random()*800+50, 0, true));
    if (frameCount === 60 || (frameCount > 60 && frameCount % 240 === 0)) {
        zombies.push(new Zombie(Math.floor(Math.random()*rows)));
    }

    suns.forEach(s => s.update());
    plants.forEach(p => p.update());
    zombies.forEach(z => z.update());
    projectiles.forEach(p => p.update());

    projectiles.forEach(p => {
        if (!p.alive) return;
        zombies.forEach(z => {
            if (!z.alive) return;
            if (z.row === Math.floor((p.y - uiHeight) / gridHeight) && Math.abs(z.x - p.x) < 30) {
                z.health -= p.damage; p.alive = false;
                if (z.health <= 0) { z.alive = false; score += 10; }
            }
        });
    });

    plants = plants.filter(p => p.health > 0);
    zombies = zombies.filter(z => z.alive);
    projectiles = projectiles.filter(p => p.alive);
    suns = suns.filter(s => s.alive);
}

function renderGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#4a3319'; ctx.fillRect(0, 0, canvas.width, uiHeight);
    ctx.fillStyle = '#ffd700'; ctx.font = "bold 20px Arial"; ctx.textAlign = "left";
    ctx.fillText(`☀️ Mặt trời: ${sun}  |  Điểm: ${score}`, 20, 50);
    
    // Thẻ Hoa hướng dương (Căn chỉnh lại vị trí để vừa 3 ô)
    ctx.fillStyle = selectedPlant === 'sunflower' ? '#bbf' : '#8c6339'; ctx.fillRect(310, 10, 80, 80);
    ctx.textAlign = "center";
    if (imgStatus.sunflower) { ctx.drawImage(imgSunflower, 325, 15, 50, 50); } 
    else { ctx.fillStyle = 'white'; ctx.font = "30px Arial"; ctx.fillText("🌻", 350, 42); }
    ctx.fillStyle = 'white'; ctx.font = "bold 14px Arial"; ctx.fillText("50", 350, 80);

    // Thẻ Cây bắn súng
    ctx.fillStyle = selectedPlant === 'peashooter' ? '#bbf' : '#8c6339'; ctx.fillRect(410, 10, 80, 80);
    if (imgStatus.peashooter) { ctx.drawImage(imgPeashooter, 425, 15, 50, 50); } 
    else { ctx.fillStyle = 'white'; ctx.font = "30px Arial"; ctx.fillText("🌱", 450, 42); }
    ctx.fillStyle = 'white'; ctx.font = "bold 14px Arial"; ctx.fillText("100", 450, 80);

    // 🛠️ THẺ BÁNH MÌ (WALLNUT)
    ctx.fillStyle = selectedPlant === 'wallnut' ? '#bbf' : '#8c6339'; ctx.fillRect(510, 10, 80, 80);
    if (imgStatus.wallnut) { ctx.drawImage(imgWallnut, 525, 15, 50, 50); } 
    else { ctx.fillStyle = 'white'; ctx.font = "30px Arial"; ctx.fillText("🍞", 550, 42); }
    ctx.fillStyle = 'white'; ctx.font = "bold 14px Arial"; ctx.fillText("50", 550, 80);

    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    for(let i=0; i<rows; i++) for(let j=0; j<cols; j++) ctx.strokeRect(j*gridWidth, i*gridHeight+uiHeight, gridWidth, gridHeight);

    suns.forEach(s => s.draw());
    plants.forEach(p => p.draw());
    zombies.forEach(z => z.draw());
    projectiles.forEach(p => p.draw());
}

function gameLoop() {
    if (gameState === 'PLAYING') {
        globalFrame++;
        if (gameSpeed === 0.5) {
            if (globalFrame % 2 === 0) updateGameLogic();
        } else {
            for (let i = 0; i < gameSpeed; i++) { if (gameState === 'PLAYING') updateGameLogic(); }
        }
    }
    renderGame();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
