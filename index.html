<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toan VS Cho Hoa</title>
    <style>
        body { margin: 0; background: url('images/hinh-nen-ngoai.jpg') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; user-select: none; overflow: hidden; }
        .game-container { position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border-radius: 8px; overflow: hidden; width: 95vw; max-width: 1200px; height: calc(95vw * 600 / 900); max-height: 90vh; }
        @media (min-aspect-ratio: 9/6) { .game-container { height: 90vh; width: calc(90vh * 900 / 600); } }
        canvas { background: #000; display: block; width: 100%; height: 100%; }
        
        .rotate-warning { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .rotate-icon { font-size: 60px; margin-bottom: 20px; animation: rotateAnim 2s infinite linear; }
        @keyframes rotateAnim { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (max-width: 900px) and (orientation: portrait) { .rotate-warning { display: flex; } }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: url('images/menu-bg.jpg') no-repeat center center; background-size: cover; }
        #mainMenu h1 { color: #5c8a32; font-size: 50px; margin: 0 0 10px 0; text-shadow: 3px 3px #000; }
        .menu-btn { background: #8c6339; color: white; border: 3px solid #4a3319; padding: 12px 50px; font-size: 22px; font-weight: bold; cursor: pointer; border-radius: 10px; box-shadow: 0 5px 0 #4a3319; margin: 8px 0; }
        .menu-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #4a3319; }
        .btn-secondary { background: #555 !important; border-color: #333 !important; box-shadow: 0 5px 0 #333 !important; }
        
        /* Hiệu ứng cảnh báo khi đại dịch đến */
        .wave-warning { position: absolute; top: 40%; left: 0; width: 100%; text-align: center; color: #ff0000; font-size: 50px; font-weight: bold; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.5s ease; }
        .wave-warning.active { animation: flashWarning 3s forwards; }
        @keyframes flashWarning { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1.2); } 40% { opacity: 0.5; transform: scale(1); } 60% { opacity: 1; transform: scale(1.1); } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div class="rotate-warning">
    <div class="rotate-icon">🔄</div>
    <h2>Vui lòng xoay ngang điện thoại</h2>
    <p style="color: #888; margin-top: 10px;">Hãy bật tính năng "Tự động xoay" và quay ngang máy để trải nghiệm game tốt nhất cùng Toàn đẹp trai nhé!</p>
</div>

<div class="game-container">
    <div id="mainMenu" class="overlay">
        <button class="menu-btn" onclick="startGame()">CHƠI</button>
    </div>

    <div id="pauseOverlay" class="overlay" style="display: none; background: rgba(0,0,0,0.8); z-index: 12;">
        <h2 style="font-size: 40px; color: #ffd700; margin-bottom: 20px;">ĐANG TẠM DỪNG</h2>
        <button class="menu-btn" onclick="togglePause()">TIẾP TỤC</button>
        <button class="menu-btn btn-secondary" style="font-size:16px; padding:8px 25px;" onclick="backToMenu()">VỀ MENU CHÍNH</button>
    </div>

    <div id="gameOverOverlay" class="overlay" style="display: none; background: url('images/gameover-bg.jpg') no-repeat center center; background-size: cover; z-index: 12;">
        <h2 style="font-size: 42px; color: #ff3333; margin-bottom: 10px; text-shadow: 2px 2px #000;">Hòa bel đã cho bạn 0 điểm văn</h2>
        <div style="display: flex; gap: 15px;">
            <button class="menu-btn" style="font-size: 18px; padding: 10px 35px;" onclick="startGame()">CHƠI LẠI</button>
            <button class="menu-btn btn-secondary" style="font-size: 18px; padding: 10px 35px;" onclick="backToMenu()">MENU CHÍNH</button>
        </div>
    </div>
    
    <div id="waveWarningText" class="wave-warning">CẢNH BÁO: ĐẠI HỒNG THỦY!!!</div>

    <canvas id="gameCanvas" width="900" height="600"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ==========================================
// --- HỆ THỐNG QUẢN LÝ NHẠC ---
// ==========================================
const menuMusic = new Audio('audio/menu.mp3'); menuMusic.loop = true; menuMusic.volume = 0.5;
const bgMusic = new Audio('audio/bgm.mp3'); bgMusic.loop = true; bgMusic.volume = 0.5;
const pauseMusic = new Audio('audio/pause.mp3'); pauseMusic.loop = false; pauseMusic.volume = 0.4;
const gameOverMusic = new Audio('audio/gameover.mp3'); gameOverMusic.loop = false; gameOverMusic.volume = 0.6;

function khichayWeb() {
    if (gameState === 'MENU') {
        menuMusic.play().catch(e => console.log("Trình duyệt chặn phát nhạc tự động"));
    }
    window.removeEventListener('click', khichayWeb);
    window.removeEventListener('touchstart', khichayWeb);
}
window.addEventListener('click', khichayWeb);
window.addEventListener('touchstart', khichayWeb);

let gameState = 'MENU', gameSpeed = 1, globalFrame = 0, sun = 250, score = 0;
const gridW = 100, gridH = 100, rows = 5, cols = 9, uiH = 100;
let plants = [], zombies = [], projectiles = [], suns = [], frameCount = 0, selectedPlant = null;
let massiveWaveTriggered = false; // Biến đánh dấu xem đại dịch đã xảy ra chưa

const plantConfig = {
    sunflower: { cost: 50, hp: 60, icon: '🌻', imgKey: 'sunflower', cooldown: 300, lastPlantedFrame: -300 },
    peashooter: { cost: 100, hp: 100, icon: '🌱', imgKey: 'peashooter', cooldown: 300, lastPlantedFrame: -300 },
    wallnut: { cost: 50, hp: 700, icon: '🍞', imgKey: 'wallnut', cooldown: 300, lastPlantedFrame: -300 }
};
const plantCards = ['sunflower', 'peashooter', 'wallnut']; 

const imgs = {}, imgStatus = {};
['sunflower', 'peashooter', 'wallnut', 'sun', 'pea', 'zombie1', 'shovel'].forEach(key => {
    imgs[key] = new Image();
    imgs[key].src = `images/${key}.png`;
    imgs[key].onload = () => imgStatus[key] = true;
});

imgs['bg_yard'] = new Image();
imgs['bg_yard'].src = 'images/bg_yard.jpg'; 
imgs['bg_yard'].onload = () => imgStatus['bg_yard'] = true;

function drawHealthBar(x, y, width, currentHp, maxHp) {
    ctx.fillStyle = 'red'; ctx.fillRect(x, y, width, 4);
    ctx.fillStyle = 'green'; ctx.fillRect(x, y, (currentHp / maxHp) * width, 4);
}

class Plant {
    constructor(x, y, type) {
        this.gridX = x; this.gridY = y;
        this.x = x * gridW + gridW / 2;
        this.y = y * gridH + uiH + gridH / 2;
        this.type = type;
        this.config = plantConfig[type];
        this.health = this.maxHealth = this.config.hp;
        this.timer = 0;
    }
    update() {
        this.timer++;
        if (this.type === 'sunflower' && this.timer % 600 === 0) {
            suns.push(new Sun(this.x + Math.random() * 20 - 10, this.y + 10, false));
        } else if (this.type === 'peashooter' && this.timer % 90 === 0 && isZombieInRow(this.gridY)) {
            projectiles.push(new Projectile(this.x + 20, this.y - 10));
        }
    }
    draw() {
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (imgStatus[this.config.imgKey]) {
            ctx.drawImage(imgs[this.config.imgKey], this.x - 40, this.y - 40, 80, 80);
        } else {
            ctx.font = "50px Arial"; ctx.fillText(this.config.icon, this.x, this.y);
        }
        drawHealthBar(this.x - 30, this.y - 45, 60, this.health, this.maxHealth);
    }
}

class Zombie {
    constructor(row) {
        this.row = row;
        this.x = canvas.width;
        this.y = row * gridH + uiH + gridH / 2;
        this.speed = 0.2 + Math.random() * 0.15;
        this.health = 120;
        this.alive = true;
    }
    update() {
        let targetPlant = plants.find(p => p.gridY === this.row && Math.abs(p.x - this.x) < 40 && p.health > 0);
        if (targetPlant) {
            targetPlant.health -= 0.5;
        } else {
            this.x -= this.speed;
        }
        if (this.x < 0) {
            gameState = 'GAMEOVER';
            document.getElementById('gameOverOverlay').style.display = 'flex';
            bgMusic.pause(); menuMusic.pause(); pauseMusic.pause();
            gameOverMusic.currentTime = 0; gameOverMusic.play().catch(e => console.log("Lỗi nhạc"));
        }
    }
    draw() {
        if (imgStatus['zombie1']) ctx.drawImage(imgs['zombie1'], this.x - 40, this.y - 50, 80, 100);
        else { ctx.font = "50px Arial"; ctx.fillText("🧟", this.x, this.y); }
        drawHealthBar(this.x - 25, this.y - 55, 50, this.health, 100);
    }
}

class Projectile {
    constructor(x, y) { this.x = x; this.y = y; this.speed = 4; this.damage = 20; this.alive = true; }
    update() { this.x += this.speed; if (this.x > canvas.width) this.alive = false; }
    draw() {
        if (imgStatus['pea']) ctx.drawImage(imgs['pea'], this.x - 10, this.y - 10, 20, 20);
        else { ctx.font = "20px Arial"; ctx.fillText("🟢", this.x, this.y); }
    }
}

class Sun {
    constructor(x, y, isFalling) {
        this.x = x; this.y = isFalling ? 0 : y;
        this.targetY = isFalling ? Math.random() * 400 + 150 : y;
        this.isFalling = isFalling; this.timer = 0; this.alive = true;
    }
    update() { 
        if (this.isFalling && this.y < this.targetY) this.y += 2; 
        this.timer++; 
        if (this.timer >= 500) this.alive = false; 
    }
    draw() {
        if (imgStatus['sun']) ctx.drawImage(imgs['sun'], this.x - 20, this.y - 20, 40, 40);
        else { ctx.font = "40px Arial"; ctx.fillText("☀️", this.x, this.y); }
    }
}

function resetGameData() {
    sun = 175; score = 0; plants = []; zombies = []; projectiles = []; suns = []; 
    frameCount = 0; selectedPlant = null; gameSpeed = 1; massiveWaveTriggered = false;
    document.getElementById('waveWarningText').classList.remove('active');
    plantCards.forEach(type => { plantConfig[type].lastPlantedFrame = -plantConfig[type].cooldown; });
}

function switchState(state, overlays) {
    gameState = state;
    ['mainMenu', 'gameOverOverlay', 'pauseOverlay'].forEach(id => {
        document.getElementById(id).style.display = overlays[id] || 'none';
    });
}

function startGame() { 
    resetGameData(); switchState('PLAYING', {}); 
    menuMusic.pause(); pauseMusic.pause(); gameOverMusic.pause();
    bgMusic.currentTime = 0; bgMusic.play().catch(e => console.log("Lỗi nhạc"));
}

function backToMenu() { 
    resetGameData(); switchState('MENU', { mainMenu: 'flex' }); 
    bgMusic.pause(); pauseMusic.pause(); gameOverMusic.pause(); 
    menuMusic.currentTime = 0; menuMusic.play().catch(e => console.log("Lỗi nhạc"));
}

function togglePause() { 
    let newState = gameState === 'PLAYING' ? 'PAUSED' : 'PLAYING';
    switchState(newState, { pauseOverlay: newState === 'PAUSED' ? 'flex' : 'none' }); 
    if (newState === 'PAUSED') {
        bgMusic.pause(); pauseMusic.currentTime = 0; pauseMusic.play();
    } else {
        pauseMusic.pause(); bgMusic.play();
    }
}

function toggleSpeed() { gameSpeed = gameSpeed === 1 ? 2 : (gameSpeed === 2 ? 0.5 : 1); }

function isZombieInRow(row) { return zombies.some(z => z.row === row && z.x > 0 && z.alive); }

canvas.addEventListener('click', (e) => {
    if (gameState !== 'PLAYING') return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);

    if (my < uiH) {
        if (mx >= 710 && mx <= 790 && my >= 10 && my <= 90) { toggleSpeed(); return; }
        if (mx >= 800 && mx <= 880 && my >= 10 && my <= 90) { togglePause(); return; }
    }

    suns.forEach((s) => { if (s.alive && Math.hypot(s.x - mx, s.y - my) < 35) { sun += 25; s.alive = false; } });

    if (my < uiH) {
        let cardIdx = Math.floor((mx - 310) / 100);
        if (cardIdx >= 0 && cardIdx < plantCards.length && mx < 310 + cardIdx * 100 + 80) {
            let type = plantCards[cardIdx]; let pCfg = plantConfig[type];
            if (frameCount - pCfg.lastPlantedFrame >= pCfg.cooldown) selectedPlant = type;
        } else if (mx >= 610 && mx <= 690) { selectedPlant = 'shovel'; }
    } else if (selectedPlant) {
        let gx = Math.floor(mx / gridW), gy = Math.floor((my - uiH) / gridH);
        if (gx >= 0 && gx < cols && gy >= 0 && gy < rows) {
            let existingPlantIndex = plants.findIndex(p => p.gridX === gx && p.gridY === gy);
            if (selectedPlant === 'shovel') {
                if (existingPlantIndex !== -1) { plants.splice(existingPlantIndex, 1); selectedPlant = null; }
            } else if (existingPlantIndex === -1) {
                if (sun >= plantConfig[selectedPlant].cost) {
                    plants.push(new Plant(gx, gy, selectedPlant));
                    sun -= plantConfig[selectedPlant].cost;
                    plantConfig[selectedPlant].lastPlantedFrame = frameCount;
                    selectedPlant = null;
                }
            }
        }
    }
});

function updateGameLogic() {
    frameCount++;
    if (frameCount % 400 === 0) suns.push(new Sun(Math.random() * 800 + 50, 0, true));

    // LÔGIC XUẤT HIỆN ZOMBIE SAU KHI ĐẠT 1000 ĐIỂM
    if (score >= 1000) {
        // Kích hoạt Đại Hồng Thủy 1 lần duy nhất
        if (!massiveWaveTriggered) {
            massiveWaveTriggered = true;
            document.getElementById('waveWarningText').classList.add('active'); // Bật hiệu ứng chữ
            
            for (let r = 0; r < rows; r++) {
                for (let i = 0; i < 15; i++) { // Xuất hiện 15 con mỗi hàng (Tổng 75 con liên tục)
                    let z = new Zombie(r);
                    z.x = canvas.width + Math.random() * 200 + i * 60; // Trải dài theo chiều ngang
                    zombies.push(z);
                }
            }
        }
        
        // Sau khi đạt 1000 điểm, tốc độ ra zombie bình thường tăng mạnh (60 frame/con thay vì 240)
        if (frameCount % 60 === 0) {
            zombies.push(new Zombie(Math.floor(Math.random() * rows)));
        }
    } 
    // LÔGIC XUẤT HIỆN ZOMBIE TRƯỚC 1000 ĐIỂM (Bình thường)
    else {
        if (frameCount === 60 || (frameCount > 60 && frameCount % 240 === 0)) {
            zombies.push(new Zombie(Math.floor(Math.random() * rows)));
        }
    }

    [...suns, ...plants, ...zombies, ...projectiles].forEach(obj => obj.update());

    projectiles.forEach(p => {
        if (!p.alive) return;
        zombies.forEach(z => {
            if (z.alive && z.row === Math.floor((p.y - uiH) / gridH) && Math.abs(z.x - p.x) < 30) {
                z.health -= p.damage; p.alive = false;
                if (z.health <= 0) { z.alive = false; score += 10; }
            }
        });
    });

    plants = plants.filter(p => p.health > 0);
    zombies = zombies.filter(z => z.alive);
    projectiles = projectiles.filter(p => p.alive);
    suns = suns.filter(s => s.alive);
}

function renderGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (imgStatus['bg_yard']) {
        ctx.drawImage(imgs['bg_yard'], 0, uiH, canvas.width, canvas.height - uiH);
    } else {
        ctx.fillStyle = '#5c8a32'; ctx.fillRect(0, uiH, canvas.width, canvas.height - uiH);
    }
    
    ctx.fillStyle = '#4a3319'; ctx.fillRect(0, 0, canvas.width, uiH);
    
    ctx.fillStyle = '#ffd700'; ctx.font = "bold 20px Arial"; ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText(`☀️ Điểm 0 môn văn: ${sun}`, 20, 35);
    ctx.fillText(`🏆 Điểm: ${score}`, 20, 70);
    
    plantCards.forEach((type, i) => {
        let x = 310 + i * 100; let pCfg = plantConfig[type];
        let framesSincePlanted = frameCount - pCfg.lastPlantedFrame;
        let isReady = framesSincePlanted >= pCfg.cooldown;
        
        ctx.fillStyle = selectedPlant === type ? '#bbf' : '#8c6339'; ctx.fillRect(x, 10, 80, 80);
        ctx.textAlign = "center";
        
        if (imgStatus[pCfg.imgKey]) ctx.drawImage(imgs[pCfg.imgKey], x + 15, 15, 50, 50);
        else { ctx.fillStyle = 'white'; ctx.font = "30px Arial"; ctx.fillText(pCfg.icon, x + 40, 42); }
        
        ctx.fillStyle = 'white'; ctx.font = "bold 14px Arial"; ctx.fillText(pCfg.cost, x + 40, 80);

        if (!isReady) {
            let cooldownRatio = 1 - (framesSincePlanted / pCfg.cooldown);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(x, 10, 80, 80 * cooldownRatio);
        }
    });

    let shovelX = 610; 
    ctx.fillStyle = selectedPlant === 'shovel' ? '#ff4d4d' : '#8c6339'; ctx.fillRect(shovelX, 10, 80, 80);
    ctx.textAlign = "center";
    if (imgStatus['shovel']) { ctx.drawImage(imgs['shovel'], shovelX + 15, 15, 50, 50); } 
    else { ctx.fillStyle = 'white'; ctx.font = "30px Arial"; ctx.fillText("⛏️", shovelX + 40, 45); }
    ctx.fillStyle = 'white'; ctx.font = "bold 16px Arial"; ctx.fillText("XÓA", shovelX + 40, 80);

    ctx.lineWidth = 2; ctx.strokeStyle = '#332211'; ctx.textAlign = "center"; ctx.textBaseline = "middle";

    ctx.fillStyle = '#8c6339'; ctx.fillRect(710, 10, 80, 80); ctx.strokeRect(710, 10, 80, 80);
    ctx.fillStyle = 'white'; ctx.font = "bold 13px Arial"; ctx.fillText("TỐC ĐỘ", 750, 35); ctx.font = "bold 18px Arial"; ctx.fillText(`${gameSpeed}x`, 750, 62);

    ctx.fillStyle = '#8c6339'; ctx.fillRect(800, 10, 80, 80); ctx.strokeRect(800, 10, 80, 80);
    ctx.fillStyle = 'white'; ctx.font = "bold 13px Arial"; ctx.fillText("TẠM", 840, 35); ctx.fillText("DỪNG", 840, 62);

    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    for(let i=0; i<rows; i++) for(let j=0; j<cols; j++) ctx.strokeRect(j*gridW, i*gridH + uiH, gridW, gridH);

    [...plants, ...zombies, ...projectiles, ...suns].forEach(obj => obj.draw());
}

function gameLoop() {
    if (gameState === 'PLAYING') {
        globalFrame++;
        if (gameSpeed === 0.5 && globalFrame % 2 === 0) updateGameLogic();
        else for (let i = 0; i < gameSpeed; i++) if (gameState === 'PLAYING') updateGameLogic();
    }
    renderGame();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
